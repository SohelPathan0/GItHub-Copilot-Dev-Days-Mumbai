<!DOCTYPE html>
<html>
<head>
  <title>Certificate Verification</title>
</head>
<body>
  <h2>Verify Your Certificate</h2>
  <input type="text" id="certId" placeholder="Enter Certificate ID">
  <button onclick="verify()">Verify</button>

  <p id="result"></p>

  <script>
    async function verify() {
      let id = document.getElementById("certId").value;
      let res = await fetch("data.json");
      let data = await res.json();

      if (data[id]) {
        document.getElementById("result").innerHTML =
          "Name: " + data[id].name + "<br>" +
          "Course: " + data[id].course + "<br>" +
          "Date: " + data[id].date;
      } else {
        document.getElementById("result").innerHTML = "Invalid Certificate";
      }
    }
  </script>
</body>
</html>
